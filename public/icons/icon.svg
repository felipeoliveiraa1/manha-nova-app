<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="55%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#2a1d18"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#fff4d6"/>
      <stop offset="35%" stop-color="#f5d99a"/>
      <stop offset="70%" stop-color="#e8b968"/>
