<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c89d4a"/>
      <stop offset="100%" stop-color="#8a6a2f"/>
    </linearGradient>
    <linearGradient id="pages" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5ebd5"/>
      <stop offset="100%" stop-color="#e6d4a8"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado (estilo iOS) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Páginas (efeito de espessura na lateral direita) -->
  <rect x="138" y="118" width="244" height="296" rx="14" fill="url(#pages)"/>
  <line x1="382" y1="130" x2="382" y2="402" stroke="#c2a875" stroke-width="2"/>

  <!-- Capa principal -->
  <rect x="118" y="100" width="248" height="312" rx="16" fill="url(#cover)"/>

  <!-- Lombada (faixa esquerda mais escura) -->
  <rect x="118" y="100" width="22" height="312" rx="6" fill="#5e4720"/>

  <!-- Borda decorativa interna -->
  <rect x="158" y="140" width="172" height="232" rx="6" fill="none"
        stroke="#f5d99a" stroke-width="2.5" opacity="0.55"/>

  <!-- Cruz dourada centralizada -->
  <g transform="translate(244, 220)" stroke="#fff4d6" stroke-width="10" stroke-linecap="round">
    <line x1="0" y1="-44" x2="0" y2="60"/>
    <line x1="-30" y1="-12" x2="30" y2="-12"/>
  </g>

  <!-- Marcador (fita) -->
  <path d="M 326 100 L 326 458 L 344 436 L 362 458 L 362 100 Z"
        fill="#a8351f" opacity="0.92"/>
</svg>
